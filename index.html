<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Selectors</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <a href="#para1">Click Here</a><br>
    <a href="#para2">Click Here</a>
    <a href="https://www.att.com" target="_blank">Click Here</a>
    
    <div>
        <p id="para1" lang="fr">This is a paragraph</p>
        <p id="para2">This is another paragraph</p>
        <div><b>This is a div</b></div>
        <p>This is another paragraph</p>
        <p></p>
    </div>
    <div>
        <div>
            <p>All</p>
        </div>

    </div>

    <ul>
        <li>Home</li>
        <li>Podcast</li>
        <li>Blog</li>
        <li>Contact</li>
    </ul>

    <table border="1">
        <tr>
            <td>01</td>
            <td>Omar</td>
        </tr>
        <tr>
            <td>02</td>
            <td>Connie</td>
        </tr>
        <tr>
            <td>03</td>
            <td>Jamela</td>
        </tr>
    </table>
    <br>
    <form action="">
        <label for="heading">Contact Us</label>
        <input type="text" name="username" placeholder="Enter User Name">
        <input type="email" name="email" placeholder="Enter Email Address" required>
        <input type="tel" name="phonenumber" disabled>
        <input type="radio" name="gender" value="Male" id="male" class="choice" checked>
        <label for="male">Male</label>
        <input type="radio" name="gender" value="Female" id="female" class="choice">
        <label for="female">Female</label>
        <button id="btn">Submit</button>
    </form>


    
</body>
</html>
